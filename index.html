<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Locate a church</title>

<style>
/* Reset / basic styles */
html,body,div,span,applet,object,iframe,h1,h2,h3,h4,h5,h6,p,blockquote,pre,a,abbr,acronym,address,big,cite,code,del,dfn,em,img,ins,kbd,q,s,samp,small,strike,strong,sub,sup,tt,var,b,u,i,center,dl,dt,dd,ol,ul,li,fieldset,form,input,label,legend,table,caption,tbody,tfoot,thead,tr,th,td,article,aside,canvas,details,embed,figure,figcaption,footer,header,hgroup,main,menu,nav,output,ruby,section,summary,time,mark,audio,video{
  margin:0;padding:0;border:0;box-sizing:border-box;
}
body { text-align:center; background:#111; color:#fff; font-family:Arial,sans-serif; }
ul { list-style: disc; margin-left:40px; } /* keep bullets */
.project__link { 
  background:none; border:none; color:#f0f0f0; font:inherit; cursor:pointer; text-decoration:none; border-bottom:1px solid #f0f0f0;
}
.project__link:hover { border-color:transparent; }
.project__name { font-size:45px; margin:20px 0; text-shadow:1px 1px 2px #000; }

/* Hide the verse <li> completely at first */
#verse-container { display:none; margin-top:10px; }
</style>
</head>

<body>

<h1 class="project__name">Your Church Guide</h1>

<ul class="project__list">
  <!-- First button -->
  <li class="project__item">
    <a class="project__link" href="gallery.html">Locate a church</a>
  </li>

  <!-- Daily verse button + verse -->
  <li class="project__item">
    <button class="project__link" onclick="showVerse()">Daily verse</button>

    <!-- Hidden container for bullet + verse -->
    <ul id="verse-container">
      <li>مزمور 46:‏1 <br> اللهُ لَنَا مَلْجَأٌ وَقُوَّةٌ، عَوْنُهُ مُتَوَافِرٌ لَنَا دَائِماً فِي الضِّيقَاتِ</li>
    </ul>
  </li>
</ul>

<script>
function showVerse() {
  var container = document.getElementById('verse-container');
  container.style.display = (container.style.display === 'none') ? 'block' : 'none';
}
</script>

</body>
</html>
